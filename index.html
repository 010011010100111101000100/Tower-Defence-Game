<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terrestrial Sentinel Siege</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,#050816,#0f172a);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.logo {
    color: white;
    font-size: 2rem;
    margin-bottom: 20px;
}

.progress-bar {
    width: 300px;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#06b6d4,#8b5cf6);
    border-radius: 20px;
}

.loading-text {
    color: white;
    margin-top: 10px;
    font-size: 0.9rem;
}

/* MINI GAME */
#gameCanvas {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 300px;
    height: 150px;
    background: #0b1220;
    border: 2px solid #3b82f6;
    border-radius: 10px;
}

/* IFRAME */
iframe {
    width: 100vw;
    height: 100vh;
    border: none;
    opacity: 0;
    transition: opacity 1s;
}
</style>
</head>
<body>

<div id="loader">
    <div class="logo">TOWER DEFENCE LOADING |TY KEKEKEA FOR TESTING!|</div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div class="loading-text" id="loadingText">Initializing...</div>

    <!-- MINI GAME -->
    <canvas id="gameCanvas" width="300" height="150"></canvas>
</div>

<iframe id="gameFrame" src="https://terrestrial-sentinel-siege-play.base44.app"></iframe>

<script>
// ---------------- LOADING ----------------
const progress = document.getElementById('progress');
const loadingText = document.getElementById('loadingText');
const loader = document.getElementById('loader');
const iframe = document.getElementById('gameFrame');

const messages = [
"Spawning enemies...","Charging towers...","Deploying units...",
"Generating map...","Loading defenses...","Preparing battle...",
"Activating shields...","Loading waves...","Deploying traps...",
"Scanning battlefield...","Charging lasers...","Preparing boss...",
"Balancing difficulty...","Loading assets...","Syncing systems..."
];

let value = 0;

const interval = setInterval(() => {
    value += Math.random() * 2.5;

    if (value > 100) value = 100;
    progress.style.width = value + "%";

    loadingText.textContent =
        messages[Math.floor(Math.random()*messages.length)];

    if (value >= 100) {
        clearInterval(interval);
        setTimeout(() => {
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
                iframe.style.opacity = "1";
            }, 1000);
        }, 800);
    }
}, 300);

// ---------------- MINI GAME ----------------
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 40,
    y: 110,
    w: 15,
    h: 15,
    dy: 0,
    grounded: true
};

let gravity = 0.5;
let obstacles = [];
let speed = 2;
let score = 0;

// jump
function jump() {
    if (player.grounded) {
        player.dy = -8;
        player.grounded = false;
    }
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

canvas.addEventListener("click", jump);

// spawn spikes
function spawnObstacle() {
    obstacles.push({
        x: canvas.width,
        y: 120,
        w: 15,
        h: 15
    });
}

setInterval(spawnObstacle, 1200);

// update
function update() {
    // physics
    player.dy += gravity;
    player.y += player.dy;

    if (player.y > 110) {
        player.y = 110;
        player.dy = 0;
        player.grounded = true;
    }

    // obstacles
    for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].x -= speed;

        // collision
        if (
            player.x < obstacles[i].x + obstacles[i].w &&
            player.x + player.w > obstacles[i].x &&
            player.y < obstacles[i].y + obstacles[i].h &&
            player.y + player.h > obstacles[i].y
        ) {
            // reset
            obstacles = [];
            score = 0;
            speed = 2;
        }
    }

    obstacles = obstacles.filter(o => o.x > -20);

    score++;
    if (score % 200 === 0) speed += 0.3;
}

// draw
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ground
    ctx.fillStyle = "#1e293b";
    ctx.fillRect(0,130,300,20);

    // player
    ctx.fillStyle = "#22c55e";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // spikes
    ctx.fillStyle = "#ef4444";
    obstacles.forEach(o => {
        ctx.beginPath();
        ctx.moveTo(o.x, o.y + o.h);
        ctx.lineTo(o.x + o.w/2, o.y);
        ctx.lineTo(o.x + o.w, o.y + o.h);
        ctx.fill();
    });

    // score
    ctx.fillStyle = "white";
    ctx.font = "10px Arial";
    ctx.fillText("Score: " + score, 5, 12);
}

// loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
