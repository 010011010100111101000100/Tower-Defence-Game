<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terrestrial Sentinel Siege</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
}

/* Loading Screen */
#loader {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #050816, #0f172a);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    transition: opacity 1s ease;
}

.logo {
    font-size: 3rem;
    font-weight: bold;
    color: white;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: glow 2s infinite alternate;
}

.subtitle {
    color: #94a3b8;
    margin-top: 10px;
    margin-bottom: 40px;
}

.loading-container {
    width: 300px;
}

.progress-bar {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
    border-radius: 20px;
    transition: width 0.2s;
}

.loading-text {
    margin-top: 15px;
    color: white;
    text-align: center;
}

.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
}

iframe {
    width: 100vw;
    height: 100vh;
    border: none;
    opacity: 0;
    transition: opacity 1s ease;
}

@keyframes glow {
    from {
        text-shadow: 0 0 10px #3b82f6;
    }
    to {
        text-shadow: 0 0 30px #8b5cf6;
    }
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>
<body>

<div id="loader">
    <div class="stars" id="stars"></div>

    <div class="logo">TSS</div>
    <div class="subtitle">Launching Terrestrial Sentinel Siege...</div>

    <div class="loading-container">
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="loading-text" id="loadingText">
            Initializing Systems...
        </div>
    </div>
</div>

<iframe
    id="gameFrame"
    src="https://terrestrial-sentinel-siege-play.base44.app"
    allowfullscreen>
</iframe>

<script>
const progress = document.getElementById('progress');
const loadingText = document.getElementById('loadingText');
const loader = document.getElementById('loader');
const iframe = document.getElementById('gameFrame');

const messages = [
    "Initializing Systems...",
    "Loading Assets...",
    "Establishing Connection...",
    "Preparing Battlefield...",
    "Deploying Sentinels...",
    "Finalizing Launch..."
];

let value = 0;

const interval = setInterval(() => {
    value += Math.random() * 12;

    if (value > 100) value = 100;

    progress.style.width = value + "%";

    const msgIndex = Math.min(
        Math.floor((value / 100) * messages.length),
        messages.length - 1
    );

    loadingText.textContent = messages[msgIndex];

    if (value >= 100) {
        clearInterval(interval);

        setTimeout(() => {
            loader.style.opacity = "0";

            setTimeout(() => {
                loader.style.display = "none";
                iframe.style.opacity = "1";
            }, 1000);
        }, 500);
    }
}, 250);

// Create stars
const starsContainer = document.getElementById('stars');

for(let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.classList.add('star');

    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';

    starsContainer.appendChild(star);
}
</script>

</body>
</html>
